version: "3.9"

services:
  app:
    build: .
    container_name: recoflow_app
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:15
    container_name: recoflow_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recoflow
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: recoflow_redis
    ports:
      - "6379:6379"